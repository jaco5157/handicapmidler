name: Deploy
on:
  push:
    branches: [ main ]
    paths:
      - 'deploy/**'
    
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:    
  deploy-code:
    name: Deploy assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Get codebase
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Minify files
        uses: docker://devatherock/minify-js:1.0.3
        with:
          directory: 'deploy'

      - name: Verify minified files
        run: |
          if [ ! -d "./deploy" ] || [ -z "$(find ./deploy -name '*.min.js' -o -name '*.min.css' 2>/dev/null)" ]; then
            echo "Warning: No minified files found in deploy directory"
          else
            echo "Minified files verified successfully"
          fi

      - name: Sync files
        uses: SamKirkland/FTP-Deploy-Action@4.2.0
        with:
          server: ${{ secrets.ftp_server }}
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          local-dir: ./deploy/
          server-dir: assets/
